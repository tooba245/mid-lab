<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

</head>
<body>


  <header>
    <div class="logo-dot"></div>
    <h1>Student <span>Task</span> Manager</h1>
    <span class="header-badge">FUI · BSET 4th .046</span>
  </header>
  <main>
  <aside>
  <p class="section-label">Add New Task</p>
   <div class="card">
    <form id="taskForm" novalidate>
   <div class="field">
   <label for="taskName">Task Name</label>
     <input type="text" id="taskName" placeholder="e.g. midterm lab " required />
    </div>
   <div class="field">
     <label for="subject">Subject</label>
    <select id="subject" required>
     <option value="" disabled selected>Select subject…</option>
     <option value="Math">Mathematics</option>
    <option value="Physics">Physics</option>
    <option value="CS">Computer Science</option>
    <option value="English">English</option>
      <option value="Other">Other</option>
      </select>
    </div>
    <div class="field">
    <label for="dueDate">Due Date</label>
     <input type="date" id="dueDate" required />
   </div>
     <button type="submit" class="btn btn-primary">＋ Add Task</button>
     </form>
      </div>

     
      <br />
      <p class="section-label">API Data</p>
      <div class="card">
        <button class="btn btn-secondary" id="fetchBtn" style="width:100%">⟳ Fetch from API</button>
      <div id="apiSection"></div>
      </div>
    </aside>

    <section>
      <p class="section-label">Task List</p>


      <div class="card controls-card">
        <div class="controls">
          <div class="control-group">
            <label>Filter by Subject</label>
            <select id="filterSubject">
              <option value="All">All Subjects</option>
              <option value="Math">Mathematics</option>
              <option value="Physics">Physics</option>
              <option value="CS">Computer Science</option>
              <option value="English">English</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="control-group">
            <label>Sort by Due Date</label>
            <select id="sortOrder">
              <option value="asc">Earliest First</option>
              <option value="desc">Latest First</option>
            </select>
          </div>
          <div class="control-group btn-group">
            <button class="btn btn-secondary" id="clearBtn">Clear All</button>
          </div>
        </div>
      </div>

     
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Task Name</th>
                <th>Subject</th>
                <th>Due Date</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="taskTableBody"></tbody>
          </table>
        </div>
      </div>
    </section>
</main>
 <div id="toast"></div>
<script src="script.js"></script>
</body>
</html>
